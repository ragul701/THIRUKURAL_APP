<!DOCTYPE html>
<html>
<head>
    <title>Aram - Athigaram</title>

    <style>

        /* PAGE SETUP */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            background: linear-gradient(120deg, #1FA2FF, #12D8FA, #A6FFCB);

            min-height: 100vh;
            overflow-y: auto;   /* ✅ scroll fix */
        }

        html {
            scroll-behavior: smooth;
        }

        /* TITLE */
        h1 {
            font-size: 40px;
            text-align: center;
            margin-top: 20px;
        }

        /* BUTTON STYLE (same as you wanted) */
        button {
            display: block;
            margin: 10px auto;
            padding: 10px 20px;
            width: 250px;
            font-size: 16px;
            background-color: teal;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkcyan;
        }

        /* LIST CONTAINER spacing */
        #list {
            padding-bottom: 50px;
        }

    </style>
</head>


<h1>அறத்துப்பால் - அதிகாரங்கள்</h1>

<div id="list"></div>

<script>

let aramAthigaram = [
"1. கடவுள் வாழ்த்து",
"2. வான்சிறப்பு",
"3. நீத்தார் பெருமை",
"4. அறன் வலியுறுத்தல்",
"5. இல்வாழ்க்கை",
"6. வாழ்க்கைத் துணைநலம்",
"7. மக்கள்பேறு",
"8. அன்புடைமை",
"9. விருந்தோம்பல்",
"10. இனியவை கூறல்",
"11. செய்ந்நன்றியறிதல்",
"12. நடுவுநிலைமை",
"13. அடக்கமுடைமை",
"14. ஒழுக்கமுடைமை",
"15. பிறனில் விழையாமை",
"16. பொறையுடைமை",
"17. அழுக்காறாமை",
"18. வெஃகாமை",
"19. புறங்கூறாமை",
"20. பயனில சொல்லாமை",
"21. தீவினையச்சம்",
"22. ஒப்புரவறிதல்",
"23. ஈகை",
"24. புகழ்",
"25. அருளுடைமை",
"26. புலால் மறுத்தல்",
"27. தவம்",
"28. கூடா ஒழுக்கம்",
"29. கள்ளாமை",
"30. வாய்மை",
"31. வெகுளாமை",
"32. இன்னாசெய்யாமை",
"33. கொல்லாமை",
"34. நிலையாமை",
"35. துறவு",
"36. மெய்யுணர்தல்",
"37. அவாவறுத்தல்",
"38. ஊழ்"
];

let container = document.getElementById("list");

aramAthigaram.forEach(item => {
    let btn = document.createElement("button");
    btn.textContent = item;

    btn.onclick = function() {
        alert(item);
    };

    container.appendChild(btn);
});

</script>
<script src="ragul.js"></script>
</body>
</html>
