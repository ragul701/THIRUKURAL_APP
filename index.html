<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<title>Thiruvalluvar App</title>

<style>
    body{
    margin:0;
    height:auto;
    min-height:100vh;
    overflow-y:scroll;
}

/* page background */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#141e30,#243b55);
    font-family: Arial;
}

/* main container */
.container{
    width:800px;
    height:450px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

/* left image side */
.left{
    width:50%;
}

.left img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* right content */
.right{
    width:50%;
    padding:30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* title */
h1{
    text-align:center;
    background: linear-gradient(90deg,#ff512f,#dd2476,#24c6dc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:20px;
}

/* quote */
p{
    text-align:center;
    font-size:18px;
    margin:5px 0;
}

/* buttons */
a{
    text-decoration:none;
}

button{
    margin-top:15px;
    padding:15px;
    width:100%;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;

    background: linear-gradient(270deg,#ff512f,#dd2476,#24c6dc,#514a9d);
    background-size:300% 300%;
    animation: move 4s ease infinite;

    transition:0.3s;
}

/* hover */
button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* animation */
@keyframes move{
    0%{background-position:0%;}
    50%{background-position:100%;}
    100%{background-position:0%;}
}

</style>

</head>

<div class="container">
    <div style="height:500px;"></div>

    <!-- Left Image -->
   <div class="left">
    <img src="images/valluvar.jpg" alt="Thiruvalluvar">
</div>

    <!-- Right Content -->
    <div class="right">

        <h1>“திருவள்ளுவர்”</h1>

        <p>அகர முதல எழுத்தெல்லாம் ஆதி பகவன் முதற்றே உலகு</p>

        <a href="teach.html">
            <button>📘 ஆசிரியர் குறிப்பு</button>
        </a>

        <a href="about.html">
            <button>🌿 முப்பால் பகுப்பு</button>
        </a>
    </div>
<script src="ragul.js"></script>
</body>
</html>
